<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>LSP integration architecture</title>
    <desc>Four-layer architecture diagram: React hooks, LSPClientManager, LSPClient, JsonRpcTransport. Monaco Editor and Backend Proxy shown as external systems.</desc>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <style>
            text { font-family: ui-sans-serif, system-ui, sans-serif; }
            .th  { font-size: 14px; font-weight: 500; fill: #3C3489; }
            .ts  { font-size: 12px; font-weight: 400; fill: #534AB7; }

            .th-teal  { font-size: 14px; font-weight: 500; fill: #085041; }
            .ts-teal  { font-size: 12px; font-weight: 400; fill: #0F6E56; }

            .th-coral { font-size: 14px; font-weight: 500; fill: #712B13; }
            .ts-coral { font-size: 12px; font-weight: 400; fill: #993C1D; }

            .th-gray  { font-size: 14px; font-weight: 500; fill: #444441; }
            .ts-gray  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }

            .th-blue  { font-size: 14px; font-weight: 500; fill: #0C447C; }
            .ts-blue  { font-size: 12px; font-weight: 400; fill: #185FA5; }

            .pill-purple { fill: #CECBF6; stroke: #534AB7; stroke-width: 0.4px; }
            .pill-teal   { fill: #9FE1CB; stroke: #0F6E56; stroke-width: 0.4px; }
            .pill-coral  { fill: #F5C4B3; stroke: #993C1D; stroke-width: 0.4px; }
            .pill-gray   { fill: #D3D1C7; stroke: #5F5E5A; stroke-width: 0.4px; }

            .pill-text-purple { font-size: 11px; fill: #3C3489; font-family: ui-sans-serif, system-ui, sans-serif; }
            .pill-text-teal   { font-size: 11px; fill: #085041; font-family: ui-sans-serif, system-ui, sans-serif; }
            .pill-text-coral  { font-size: 11px; fill: #712B13; font-family: ui-sans-serif, system-ui, sans-serif; }
            .pill-text-gray   { font-size: 11px; fill: #444441; font-family: ui-sans-serif, system-ui, sans-serif; }
        </style>
    </defs>

    <!-- ── Layer index labels ───────────────────────────────────────────────── -->
    <text class="ts-gray" x="28" y="96"  text-anchor="middle" transform="rotate(-90,28,96)">Layer 4</text>
    <text class="ts-gray" x="28" y="218" text-anchor="middle" transform="rotate(-90,28,218)">Layer 3</text>
    <text class="ts-gray" x="28" y="350" text-anchor="middle" transform="rotate(-90,28,350)">Layer 2</text>
    <text class="ts-gray" x="28" y="482" text-anchor="middle" transform="rotate(-90,28,482)">Layer 1</text>

    <!-- ══ LAYER 4 – React Hooks (purple) ══════════════════════════════════════ -->
    <rect x="50" y="46" width="580" height="92" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th"  x="340" y="69"  text-anchor="middle">React hooks</text>
    <text class="ts"  x="340" y="86"  text-anchor="middle">orchestrate document lifecycle</text>

    <!-- pills row -->
    <rect class="pill-purple" x="68"  y="100" width="176" height="26" rx="5"/>
    <text class="pill-text-purple" x="156" y="117" text-anchor="middle">useEditorModelManager</text>

    <rect class="pill-purple" x="256" y="100" width="184" height="26" rx="5"/>
    <text class="pill-text-purple" x="348" y="117" text-anchor="middle">useMonacoGarbageCollector</text>

    <rect class="pill-purple" x="452" y="100" width="160" height="26" rx="5"/>
    <text class="pill-text-purple" x="532" y="117" text-anchor="middle">useLSPSetup</text>

    <!-- ══ LAYER 3 – LSPClientManager (teal) ═══════════════════════════════════ -->
    <rect x="50" y="176" width="580" height="92" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th-teal" x="340" y="199" text-anchor="middle">LSPClientManager</text>
    <text class="ts-teal" x="340" y="216" text-anchor="middle">singleton · one client per language · lazy start</text>

    <!-- 1. onDocumentOpen (Breite: 168, Text-Mitte: 68 + 84 = 152) -->
    <rect class="pill-teal" x="68"  y="230" width="168" height="26" rx="5"/>
    <text class="pill-text-teal" x="152" y="247" text-anchor="middle">onDocumentOpen</text>

    <!-- 2. onDocumentChange (Start: 68 + 168 + 20 = 256, Text-Mitte: 256 + 84 = 340) -->
    <rect class="pill-teal" x="256" y="230" width="168" height="26" rx="5"/>
    <text class="pill-text-teal" x="340" y="247" text-anchor="middle">onDocumentChange</text>

    <!-- 3. onDocumentClose (Start: 256 + 168 + 20 = 444, Text-Mitte: 444 + 84 = 528) -->
    <rect class="pill-teal" x="444" y="230" width="168" height="26" rx="5"/>
    <text class="pill-text-teal" x="528" y="247" text-anchor="middle">onDocumentClose</text>

    <!-- ══ LAYER 2 – LSPClient (coral) ═════════════════════════════════════════ -->
    <rect x="50" y="306" width="580" height="92" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="th-coral" x="340" y="329" text-anchor="middle">LSPClient</text>
    <text class="ts-coral" x="340" y="346" text-anchor="middle">LSP handshake · doc sync · Monaco provider registration · diagnostics</text>

    <rect class="pill-coral" x="68"  y="360" width="80"  height="26" rx="5"/>
    <text class="pill-text-coral" x="108" y="377" text-anchor="middle">didOpen</text>

    <rect class="pill-coral" x="160" y="360" width="90"  height="26" rx="5"/>
    <text class="pill-text-coral" x="205" y="377" text-anchor="middle">didChange</text>

    <rect class="pill-coral" x="262" y="360" width="82"  height="26" rx="5"/>
    <text class="pill-text-coral" x="303" y="377" text-anchor="middle">didClose</text>

    <rect class="pill-coral" x="356" y="360" width="136" height="26" rx="5"/>
    <text class="pill-text-coral" x="424" y="377" text-anchor="middle">completion / hover</text>

    <rect class="pill-coral" x="504" y="360" width="118" height="26" rx="5"/>
    <text class="pill-text-coral" x="563" y="377" text-anchor="middle">diagnostics</text>

    <!-- ══ LAYER 1 – JsonRpcTransport (gray) ═══════════════════════════════════ -->
    <rect x="50" y="436" width="580" height="92" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text class="th-gray" x="340" y="459" text-anchor="middle">JsonRpcTransport</text>
    <text class="ts-gray" x="340" y="476" text-anchor="middle">WebSocket lifecycle · request/response correlation · notification dispatch</text>

    <rect class="pill-gray" x="68"  y="490" width="82"  height="26" rx="5"/>
    <text class="pill-text-gray" x="109" y="507" text-anchor="middle">connect</text>

    <rect class="pill-gray" x="162" y="490" width="82"  height="26" rx="5"/>
    <text class="pill-text-gray" x="203" y="507" text-anchor="middle">request</text>

    <rect class="pill-gray" x="256" y="490" width="72"  height="26" rx="5"/>
    <text class="pill-text-gray" x="292" y="507" text-anchor="middle">notify</text>

    <rect class="pill-gray" x="340" y="490" width="132" height="26" rx="5"/>
    <text class="pill-text-gray" x="406" y="507" text-anchor="middle">onNotification</text>

    <rect class="pill-gray" x="484" y="490" width="82"  height="26" rx="5"/>
    <text class="pill-text-gray" x="525" y="507" text-anchor="middle">dispose</text>

    <!-- ══ Inter-layer arrows ═══════════════════════════════════════════════════ -->
    <line x1="340" y1="138" x2="340" y2="174"
          stroke="#5F5E5A" stroke-width="0.8"
          marker-end="url(#arrow)" marker-start="url(#arrow)"/>

    <line x1="340" y1="268" x2="340" y2="304"
          stroke="#5F5E5A" stroke-width="0.8"
          marker-end="url(#arrow)" marker-start="url(#arrow)"/>

    <line x1="340" y1="398" x2="340" y2="434"
          stroke="#5F5E5A" stroke-width="0.8"
          marker-end="url(#arrow)" marker-start="url(#arrow)"/>

    <!-- ══ External: Monaco Editor ══════════════════════════════════════════════ -->
    <rect x="50" y="12" width="118" height="28" rx="6"
          fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="th-blue" x="109" y="30" text-anchor="middle" font-size="12">Monaco editor</text>
    <line x1="109" y1="40" x2="109" y2="44"
          stroke="#185FA5" stroke-width="0.5" stroke-dasharray="4 3"
          marker-end="url(#arrow)"/>

    <!-- ══ External: Backend Proxy ══════════════════════════════════════════════ -->
    <rect x="50" y="545" width="580" height="1" fill="none"/>
    <!-- right-side badge -->
    <rect x="50" y="539" width="580" height="1" fill="none"/>

    <!-- WebSocket label + backend box on the right -->
    <rect x="460" y="12" width="170" height="40" rx="6"
          fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="th-blue" x="545" y="29" text-anchor="middle" font-size="12">Backend proxy</text>
    <text class="ts-blue" x="545" y="44" text-anchor="middle" font-size="10">WebSocket / JSON-RPC</text>

    <!-- Dashed line: backend → transport (right edge) -->
    <path d="M 630 52 L 630 482 Q 630 490 622 490"
          fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="4 3"
          marker-end="url(#arrow)"/>

</svg>