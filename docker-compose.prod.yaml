services:
  database:
    image: "mariadb:latest"
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-hello}
      MYSQL_DATABASE: quak
      MYSQL_USER: root
    volumes:
      - db:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -uroot --password=\"$${MARIADB_ROOT_PASSWORD}\"" ]
      interval: 1m
      timeout: 5s
      start_period: 1m
      start_interval: 5s
    networks:
      - quak-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SKIP_FRONTEND: "false"
    container_name: quak-backend
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://database:3306/quak
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_ROOT_PASSWORD:-hello}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FRONTEND_URL: http://localhost:8080
      # OpenTelemetry configuration for SigNoz
      OTEL_RESOURCE_ATTRIBUTES: service.name=QuaK,service.version=0.0.1
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-ingester-1:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
    env_file:
      - ./backend/.env
    networks:
      - quak-network
      - traefik-net
    restart: unless-stopped

volumes:
  db:


networks:
  quak-network:
    driver: bridge
  traefik-net:
    external: true
