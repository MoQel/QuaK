# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches:
      - "development"
  pull_request:
    branches: [ "development" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.4.2
      - name: Run tests
        run: cd backend && ./gradlew :test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.4.2

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Build with Gradle Wrapper
        run: cd backend && ./gradlew :bootJar

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: Application
          path: backend/build/libs/*.jar
  download:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Get repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          name: Application
          path: backend/build/libs/
      - name: Commit artifact
        id: commit
        run: |
          git add -f backend/build/libs/QuaK-0.0.1-SNAPSHOT.jar
          git config user.name "Pipeline Runner"
          git config user.email "<runner@example.com>"
          git commit -m "Add build artifact [ONLY FOR PRODUCTION]"
          echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Push to dokku
        uses: dokku/github-action@v1.8.0
        with:
          branch: development
          git_remote_url: ssh://dokku@${{ secrets.DEPLOYMENT_SERVER_ADDRESS }}/quak
          ssh_private_key: ${{ secrets.DEPLOYMENT_SERVER_SSH_KEY }}
          ci_commit: ${{ steps.commit.outputs.COMMIT_ID }}
          git_push_flags: '--force --no-verify'
