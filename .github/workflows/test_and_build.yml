name: PR CI Pipeline

on:
  pull_request:
    branches:
      - "development"
      - "main"
      - "merge/**"
      - "feature/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Checkstyle
        run: cd backend && ./gradlew checkstyleMain checkstyleTest

      - name: Run Tests
        run: cd backend && ./gradlew :test

  build:
    name: Build Application
    needs: test
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: cd backend && ./gradlew :bootJar

  auto-format:
    name: Auto-Format with Spotless
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Spotless Formatting
        id: spotless-check
        continue-on-error: true
        run: |
          cd backend
          ./gradlew spotlessCheck

      - name: Apply Spotless Formatting
        if: steps.spotless-check.outcome == 'failure'
        run: |
          cd backend
          ./gradlew spotlessApply

      - name: Commit and Push Formatting Changes
        if: steps.spotless-check.outcome == 'failure'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Java code with Spotless [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          branch: ${{ github.head_ref }}
