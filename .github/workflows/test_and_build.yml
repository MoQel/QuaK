name: PR CI Pipeline

on:
  push:
    branches:
      - "development"
      - "main"
  pull_request:
    branches:
      - "development"
      - "main"
      - "merge/**"
      - "feature/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: Check Code Formatting (Spotless)
        if: github.event_name == 'pull_request'
        run: |
          cd backend
          ./gradlew spotlessCheck || {
            echo "❌ Code formatting check failed!"
            echo ""
            echo "Please run the following command locally to fix formatting:"
            echo "  cd backend && ./gradlew spotlessApply"
            echo ""
            echo "Then commit and push the changes."
            exit 1
          }

      - name: Run Tests
        run: cd backend && ./gradlew :test

  build:
    name: build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: Build with Gradle
        run: cd backend && ./gradlew :bootJar

  generate-openapi:
    name: generate-openapi
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: Generate OpenAPI YAML
        run: cd backend && ./gradlew generateOpenApiDocs
        
      - name: Upload OpenAPI Spec
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openapi-spec
          path: docs/api/openapi.yaml

      - name: Commit and Push OpenAPI Spec
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/api/openapi.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: automated update of openapi spec" && git push)
