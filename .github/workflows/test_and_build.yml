name: Java CI with Auto-Format

on:
  push:
    branches:
      - "development"
      - "main"
      - "merge/**"
      - "feature/**"
  pull_request:
    branches:
      - "development"
      - "main"
      - "merge/**"
      - "feature/**"

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Spotless Apply
        run: |
          cd backend
          ./gradlew spotlessApply

      # Only commit if it's a PUSH. 
      # On Pull Requests, we don't auto-commit because it blocks the CI due to GITHUB_TOKEN limits.
      - name: Commit and Push formatting fixes
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Java code with Spotless"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Run Checkstyle
        run: cd backend && ./gradlew checkstyleMain checkstyleTest

      - name: Run Tests
        run: cd backend && ./gradlew :test

  build:
    name: build
    needs: test
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: cd backend && ./gradlew :bootJar
