name: Java CI with Auto-Format

on:
  push:
    branches:
      - "development"
      - "main"
  pull_request:
    branches:
      - "development"
      - "main"
      - "merge/**"
      - "feature/**"

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    # Skip if the commit was already made by the bot to avoid redundant runs
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Necessary to allow pushing changes back
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # --- 1. FORMATTING ---
      - name: Run Spotless Apply (Auto-Format)
        run: |
          cd backend
          ./gradlew spotlessApply

      - name: Commit and Push formatting fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Java code with Spotless"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      # --- 2. LINTING ---
      - name: Run Checkstyle
        run: cd backend && ./gradlew checkstyleMain checkstyleTest

      # --- 3. TESTING ---
      - name: Run Tests
        run: cd backend && ./gradlew :test

      # --- 4. BUILDING ---
      - name: Build with Gradle
        run: cd backend && ./gradlew :bootJar
