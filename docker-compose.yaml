services:
  database:
    image: "mariadb:latest"
    restart: always
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: hello
      MYSQL_DATABASE: quak
      MYSQL_USER: root
    volumes:
      - db:/var/lib/data
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "--password=hello"]
      interval: 1m
      timeout: 5s
      start_period: 1m
      start_interval: 5s


  app:
    build: backend
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://database:3306/quak
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: hello

volumes:
  db:
