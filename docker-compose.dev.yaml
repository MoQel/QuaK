services:
  database:
    image: "mariadb:latest"
    restart: always
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: hello
      MYSQL_DATABASE: quak
      MYSQL_USER: root
    volumes:
      - db:/var/lib/data
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "--password=hello" ]
      interval: 1m
      timeout: 5s
      start_period: 1m
      start_interval: 5s
    networks:
      - quak-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SKIP_FRONTEND: "true"
    container_name: quak-backend
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    environment:
      # Enable development profile (uses HTTP Basic Auth instead of OAuth2)
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mariadb://database:3306/quak
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: hello
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FRONTEND_URL: http://localhost:5173
      QUAK_LSP_SERVERS_PYTHON_COMMAND_0: /opt/lsp/python/bin/pylsp
      QUAK_LSP_SERVERS_PYTHON_WORKINGDIRECTORY: /var/lib/quak/lsp-workspace
      QUAK_LSP_SERVERS_PYTHON_ENVIRONMENT_PYTHONUNBUFFERED: "1"
      QUAK_LSP_SERVERS_QASM_COMMAND_0: /opt/lsp/qasm/qasmlsp
      QUAK_LSP_SERVERS_QASM_WORKINGDIRECTORY: /var/lib/quak/lsp-workspace
      QUAK_LSP_LIMITS_MAXPROCESSES: ${QUAK_LSP_MAX_PROCESSES:-40}
      QUAK_LSP_LIMITS_MAXPROCESSESPERUSER: ${QUAK_LSP_MAX_PROCESSES_PER_USER:-4}
    env_file:
      - ./backend/.env
    tmpfs:
      - /var/lib/quak/lsp-workspace:uid=10001,gid=10001,mode=0700
    networks:
      - quak-network
    restart: unless-stopped

volumes:
  db:


networks:
  quak-network:
    driver: bridge
