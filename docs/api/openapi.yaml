openapi: 3.1.0
info:
  title: QuaK API
  description: |
    RESTful API for the QuaK application - A quantum computing project management platform.

    ## Authentication

    **Development Mode** (`dev` profile): Use HTTP Basic Auth
    - Username: `admin`
    - Password: `admin`

    **Production Mode**: OAuth2/OIDC via Google
  contact:
    name: QuaK Development Team
    email: quak@kit.edu
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: 0.0.1-SNAPSHOT
servers:
- url: http://localhost:8080
  description: Local Development Server
security:
- basicAuth: []
tags:
- name: Files
  description: File and directory management operations
- name: Operation Definitions
  description: Definitions of quantum operations
- name: Circuit
  description: Controls operations on a quantum circuit
- name: Projects
  description: Project management operations
- name: Authentication
  description: Authentication and user session management endpoints
- name: TESTING_THE_PIPLINE_OF_AUTO_OPENAPI_CREATION_Authentication
  description: Authentication and user session management endpoints
