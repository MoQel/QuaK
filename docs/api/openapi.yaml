                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CircuitResponse"
components:
  schemas:
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        properties:
          type: object
          additionalProperties:
            type: object
    FileContentRequest:
      type: object
      properties:
        content:
          type: string
          format: byte
        contentType:
          type: string
      required:
      - content
      - contentType
    ProjectRequest:
      type: object
      properties:
        name:
          type: string
      required:
      - name
    ProjectDetailsResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        createdOn:
          type: string
          format: date-time
        lastAccess:
          type: string
          format: date-time
    CreateFileRequest:
      type: object
      properties:
        name:
          type: string
        contentType:
          type: string
          pattern: "^[a-z]+/[-a-z0-9]+$"
      required:
      - contentType
      - name
    FileDetailsResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        createdOn:
          type: string
          format: date-time
        lastAccess:
          type: string
          format: date-time
        contentType:
          type: string
    DirectoryRequest:
      type: object
      properties:
        name:
          type: string
      required:
      - name
    DirectoryDetailsResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        createdOn:
          type: string
          format: date-time
        lastAccess:
          type: string
          format: date-time
    CircuitResponse:
      type: object
      properties:
        id:
          type: string
        registers:
          type: array
          items:
            $ref: "#/components/schemas/RegisterResponse"
    GateResponse:
      type: object
      properties:
        id:
          type: string
        definitionId:
          type: string
          enum:
          - H
          - X
          - "Y"
          - Z
          - CX
          - CCX
          - CZ
          - SWAP
          - S
          - T
          - RX
          - RY
          - RZ
          - MEASURE
    QubitResponse:
      type: object
      properties:
        id:
          type: string
        gates:
          type: array
          items:
            $ref: "#/components/schemas/GateResponse"
    RegisterResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        qubits:
          type: array
          items:
            $ref: "#/components/schemas/QubitResponse"
    AddGateRequest:
      type: object
      properties:
        definitionId:
          type: string
        toQubitIdx:
          type: integer
          format: int32
        toPositionIdx:
          type: integer
          format: int32
    RestLogoutResponse:
      type: object
      properties:
        message:
          type: string
    RenameFileRequest:
      type: object
      properties:
        name:
          type: string
      required:
      - name
    ChangeQubitNameRequest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    MoveGateRequest:
      type: object
      properties:
        id:
          type: string
        toQubitIdx:
          type: integer
          format: int32
        toPositionIdx:
          type: integer
          format: int32
    FileElementDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        createdOn:
          type: string
          format: date-time
        lastAccess:
          type: string
          format: date-time
    ProjectContentsResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        contents:
          type: array
          items:
            $ref: "#/components/schemas/FileElementDto"
        createdOn:
          type: string
          format: date-time
        lastAccess:
          type: string
          format: date-time
    UserResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
        emailVerified:
          type: boolean
    GateDefinitionResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        description:
          type: string
        qubitCount:
          type: integer
          format: int32
        symbol:
          type: string
        parameters:
          type: array
          items:
            type: string
        inspectorInfo:
          $ref: "#/components/schemas/InspectorInfoResponse"
    InspectorInfoResponse:
      type: object
      properties:
        operatorDefinition:
          type: string
        truthTable:
          type: array
          items:
            $ref: "#/components/schemas/TruthTableEntryResponse"
        matrix:
          $ref: "#/components/schemas/MatrixInfoResponse"
    MatrixInfoResponse:
      type: object
      properties:
        display:
          type: string
        rows:
          type: integer
          format: int32
        cols:
          type: integer
          format: int32
        computable:
          type: array
          items:
            type: array
            items:
              type: string
    TruthTableEntryResponse:
      type: object
      properties:
        input:
          type: string
        output:
          type: string
    FileContentResponse:
      type: object
      properties:
        content:
          type: string
          format: byte
    DirectoryContentsResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        contents:
          type: array
          items:
            $ref: "#/components/schemas/FileElementDto"
        createdOn:
          type: string
          format: date-time
        lastAccess:
          type: string
          format: date-time
    RestAuthStatusResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        userId:
          type: string
          format: uuid
  securitySchemes:
    basicAuth:
      type: http
      description: "HTTP Basic Authentication (dev mode: admin/admin)"
      scheme: basic
