plugins {
	id 'java'
	id 'antlr'
	id 'org.springframework.boot' version '3.4.5'
	id 'io.spring.dependency-management' version '1.1.7'
	id "com.github.node-gradle.node" version "7.1.0"
}
apply from: 'node.gradle'

group = 'edu.kit'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-jdbc'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation "org.antlr:antlr4-runtime:4.13.1"
	antlr "org.antlr:antlr4:4.13.1"
	runtimeOnly 'com.h2database:h2'
	runtimeOnly "org.mariadb.jdbc:mariadb-java-client:3.5.4"
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Including parser and lexer in generated-src
def generatedRoot = layout.buildDirectory.dir("generated-src/antlr/main")
def generatedPkg  = generatedRoot.map { it.dir("edu/kit/quak/parser/qasm") }

generateGrammarSource {
	maxHeapSize = "64m"
	arguments += ['-visitor', '-long-messages', '-package', 'edu.kit.quak.parser.qasm']

	outputDirectory = generatedPkg.get().asFile
}

sourceSets.main.java.srcDir(generatedRoot)

tasks.compileJava {
	dependsOn(tasks.named("generateGrammarSource"))
}

tasks.register('cleanFrontendFiles', Delete) {
	group = 'QuaK'
	def stat = layout.projectDirectory.dir("src/main/resources/static").asFile
	def toDelete = stat.listFiles().findAll() { file ->
		!file.name.startsWith(".git")
	}
	delete toDelete
}

tasks.register('getFrontend', Copy) {
	dependsOn npm_run_build
	dependsOn cleanFrontendFiles
	group = 'QuaK'
	description = 'Copy frontend into static-folder inside the backend'
	from(layout.projectDirectory.dir("../frontend/dist"))
	into(layout.projectDirectory.dir('src/main/resources/static'))
}

tasks.named("processResources") {
	dependsOn getFrontend
}

tasks.named("bootRun") {
	group = 'QuaK'
	mainClass = 'edu.kit.quak.QuaKApplication'
	dependsOn generateGrammarSource
}

tasks.named('test') {
	useJUnitPlatform()
}
