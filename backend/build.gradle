plugins {
	id 'java'
	id 'org.springframework.boot' version '3.4.5'
	id 'io.spring.dependency-management' version '1.1.7'
	id "com.github.node-gradle.node" version "7.1.0"
}
apply from: 'node.gradle'

group = 'edu.kit'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-jdbc'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation("org.mapstruct:mapstruct:1.5.5.Final")
	annotationProcessor("org.mapstruct:mapstruct-processor:1.5.5.Final")
	runtimeOnly 'com.h2database:h2'
	runtimeOnly "org.mariadb.jdbc:mariadb-java-client:3.5.4"
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.register('cleanFrontendFiles', Delete) {
	group = 'QuaK'
	def stat = layout.projectDirectory.dir("src/main/resources/static").asFile
	def toDelete = stat.listFiles().findAll() { file ->
		!file.name.startsWith(".git")
	}
	delete toDelete
}

tasks.register('getFrontend', Copy) {
	dependsOn npm_run_build
	dependsOn cleanFrontendFiles
	group = 'QuaK'
	description = 'Copy frontend into static-folder inside the backend'
	from(layout.projectDirectory.dir("../frontend/dist"))
	into(layout.projectDirectory.dir('src/main/resources/static'))
}

tasks.named("processResources") {
	dependsOn getFrontend
}

tasks.named("bootRun") {
	group = 'QuaK'
	mainClass = 'edu.kit.quak.QuaKApplication'
}

tasks.named('test') {
	useJUnitPlatform()
}
