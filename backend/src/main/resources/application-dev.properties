# ================================
# Development Profile Configuration
# ================================
# This profile bypasses OAuth2 and uses HTTP Basic Auth for easier development/testing

# Use H2 in-memory database for development
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:quak-dev;DB_CLOSE_DELAY=-1
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Development user credentials for HTTP Basic Auth
app.dev.username=admin
app.dev.password=admin

# Disable CSRF for easier API testing in development
app.dev.csrf.disabled=true

# Frontend URL for development
app.frontend.url=http://localhost:5173
