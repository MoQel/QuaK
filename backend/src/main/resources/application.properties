spring.application.name=QuaK
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:localhost

# OAuth2 / OIDC Configuration
spring.security.oauth2.client.registration.google.client-id=${OIDC_CLIENT_ID:your-client-id-here}
spring.security.oauth2.client.registration.google.client-secret=${OIDC_CLIENT_SECRET:your-client-secret-here}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.google.issuer-uri=${OIDC_ISSUER:https://accounts.google.com}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# Session Configuration
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# Frontend URL (for redirects after login)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ================================
# OpenAPI / Swagger Configuration
# ================================
# API docs path (JSON format: /api-docs, YAML format: /api-docs.yaml)
springdoc.api-docs.path=/api-docs

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html

# Sort tags alphabetically
springdoc.swagger-ui.tagsSorter=alpha

# Sort operations by HTTP method
springdoc.swagger-ui.operationsSorter=method

# Enable "Try it out" button by default
springdoc.swagger-ui.tryItOutEnabled=true

# Display operation IDs
springdoc.swagger-ui.displayOperationId=false

# Filter/search box
springdoc.swagger-ui.filter=true
