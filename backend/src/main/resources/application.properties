# Import .env file if it exists (Spring Boot native support)
spring.config.import=optional:file:.env[.properties],optional:file:application-local.yaml

spring.application.name=QuaK
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/quak}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:hello}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# OAuth2 / OIDC Configuration
spring.security.oauth2.client.registration.google.client-id=${OIDC_CLIENT_ID:your-client-id-here}
spring.security.oauth2.client.registration.google.client-secret=${OIDC_CLIENT_SECRET:your-client-secret-here}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# GitHub OAuth2 Configuration
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.issuer-uri=${OIDC_ISSUER:https://accounts.google.com}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# Session Configuration
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=1h
server.servlet.session.cookie.max-age=7d

# Frontend URL (for redirects after login)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ================================
# OpenAPI / Swagger Configuration
# ================================
# API docs path (JSON format: /api-docs, YAML format: /api-docs.yaml)
springdoc.api-docs.path=/api-docs

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html

# Sort tags alphabetically
springdoc.swagger-ui.tagsSorter=alpha

# Sort operations by HTTP method
springdoc.swagger-ui.operationsSorter=method

# Enable "Try it out" button by default
springdoc.swagger-ui.tryItOutEnabled=true

# Display operation IDs
springdoc.swagger-ui.displayOperationId=false

# Default media type for all responses
springdoc.default-produces-media-type=application/json

# Filter/search box
springdoc.swagger-ui.filter=true

# Library Configuration
quak.library.operation-definitions-file=operation-definitions.json
